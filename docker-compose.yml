services:
  app:
    image: infinite-canvas:latest
    container_name: infinite-canvas
    network_mode: host
    env_file:
      - /opt/infinite-canvas-secrets/tokaxis-canvas-proxy.env
    environment:
      PORT: "3100"
      TOKAXIS_INTERNAL_ORIGIN: "http://127.0.0.1:3000"
      PROMPT_CACHE_DIR: "/app/data/prompt-cache"
    volumes:
      - /opt/infinite-canvas-data/prompt-cache:/app/data/prompt-cache
    restart: unless-stopped
